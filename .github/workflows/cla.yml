name: "CLA Assistant Lite"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write
  issues: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant Lite"
        # ?. body のように、イベントが存在しない場合にエラーにならないよう考慮
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA and agree to its terms') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.5.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          # 先ほど作成したGistのIDをここに貼ります
          remote-gist-id: "23711cf943dee70556684bccb2e46dae"
          remote-repository-name: "signatures.json"
          path-to-signatures: "signatures.json"
          branch: "main"
          # 同意させるライセンスへのリンク
          path-to-document: "https://github.com/${{ github.repository }}/blob/main/LICENSE.md"
          # PR時にBotが投稿するメッセージ
          custom-notsigned-prcomment: "MagicalMechanics への貢献ありがとうございます！<br/>本プロジェクトへ寄与いただくには、[LICENSE.md](https://github.com/${{ github.repository }}/blob/main/LICENSE.md) への同意が必要です。<br/><br/>内容を確認し、同意いただける場合は以下のフレーズを**そのままコメント**してください：<br/><br/>I have read the CLA and agree to its terms"
