name: "CLA Assistant Lite"
on:
  issue_comment:
    types: [created, edited] # 編集も監視して再チェックを走らせる
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write
  issues: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant Lite"
        # コメントが正しいフレーズか、またはPRの更新時に実行
        if: (github.event.issue.pull_request && (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA and agree to its terms')) || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.5.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          remote-gist-id: "23711cf943dee70556684bccb2e46dae"
          remote-repo-name: "signatures.json"
          path-to-signatures: "signatures.json"
          path-to-cla: "https://github.com/${{ github.repository }}/blob/main/LICENSE.md"
          
          # 未署名時のメッセージ（少し厳格に）
          custom-notsigned-prcomment: "⚠️ **MagicalMechanics への貢献には認証が必要です** ⚠️<br/>[LICENSE.md](https://github.com/${{ github.repository }}/blob/main/LICENSE.md) を確認し、同意する場合は以下のフレーズを**そのままコメント**してください。認証されるまでマージは許可されません。<br/><br/>I have read the CLA and agree to its terms"
          
          # 署名完了時のメッセージ
          custom-allsigned-prcomment: "✅ **認証完了**<br/>ライセンスへの同意を確認しました。ありがとうございます。"
